<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unified College AI System | Login</title>
<style>
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: 'Segoe UI', sans-serif;
  overflow:hidden;
}

.login-container{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  color:#fff;
  animation: fadeIn 1s ease forwards;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.login-container.fade-out{
  opacity:0;
  transform: translateY(-50px);
}

.login-container h1{
  margin-bottom:25px;
  color:#00eaff;
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#00eaff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00c6ff;
}

@keyframes fadeIn{
  from {opacity:0; transform:translateY(-20px);}
  to {opacity:1; transform:translateY(0);}
}

.error{
  color:#ff4b5c;
  margin-top:8px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <h1>Unified AI College System</h1>
  <input type="text" id="userId" placeholder="User ID">
  <input type="password" id="password" placeholder="Password">
  <select id="role">
    <option value="">Select Role</option>
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
    <option value="principal">Principal</option>
    <option value="clerk">Admin / Clerk</option>
  </select>
  <button onclick="login()">Login</button>
  <p class="error" id="errorMsg"></p>
</div>

<script>
function login(){
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;
  const errorMsg = document.getElementById("errorMsg");
  const container = document.getElementById("loginContainer");

  if(userId === "" || password === "" || role === ""){
    errorMsg.style.color = "#ff4b5c";
    errorMsg.innerText = "Please fill all fields and select a role!";
    return;
  }

  
  errorMsg.style.color = "#00eaff";
  errorMsg.innerText = "Logging in...";

  
  container.classList.add("fade-out");

  
  setTimeout(()=>{
    if(role === "student") window.location.href = "student.html";
    else if(role === "teacher") window.location.href = "teacher.html";
    else if(role === "principal") window.location.href = "principal.html";
    else if(role === "clerk") window.location.href = "clerk.html";
  }, 800); 
}
</script>

</body>
</html>
